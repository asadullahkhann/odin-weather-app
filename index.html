<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Visual Weather</title><script defer="defer" src="main.js"></script></head><body><header><h1>Visual Weather</h1><div class="search-bar"><input name="city" value="mumbai" placeholder="Search"> <button class="bold" aria-label="search"><span>Search</span> <span aria-hidden="true" class="spinner hide"></span></button> <span id="status" class="sr-only" aria-live="polite"></span></div></header><main><div class="weather-card hide"><div class="current-weather"><div><div class="address"><img src="a2eec1be2591cea84bbb.svg" alt=""><p class="bold">Mumbai</p></div><div class="temp-wrapper"><img alt="" class="weather-icon"><p class="curr-temp"></p><div class="temp-btns-wrapper"><button class="celsius-btn">°C</button> <span></span> <button class="fahrenheit-btn">°F</button></div></div><p class="text-secondary feels-like">Feels like 26 &deg</p></div><div><p class="bold conditions">Clear</p><p class="text-secondary humidity">Humidity: 77%</p><p class="text-secondary wind-speed">Wind: 8 km/h</p></div></div><div class="forecast"></div></div><p class="error-msg hide"></p></main><footer><p>Coded by <a href="https://github.com/asadullahkhann">AsadUllahKhaNn <img src="97ed8e7eef60d61ca469.svg" alt="github-mark"/></a></p></footer></body></html>
