<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Weather</title>
</head>
<body>
  <header>
    <h1>Visual Weather</h1>
    <div class="search-bar">
      <input name="city" value="mumbai" placeholder="Search">
      <button aria-label="search">
        <span>Search</span>
        <span aria-hidden="true" class="spinner hide"></span>
      </button>
      <span id="status" class="sr-only" aria-live="polite"></span>
    </div>
  </header>
  <main>
    <div class="weather-card hide">
      <div class="address">
        <img src="./images/location-pin.svg" alt="">
        <p></p>
      </div>
      <div class="dropdown-wrapper">
        <button class="toggle-btn" aria-label="Select temperature unit">⋮</button>
        <div class="dropdown hide">
          <p>
            <input type="radio" name="unit" id="fahrenheit-btn">
            <label for="fahrenheit-btn">Fahrenheit – °F</label>
          </p>
          <p>
            <input type="radio" name="unit" id="celsius-btn" checked>
            <label for="celsius-btn">Celsius – °C</label>
          </p>
        </div>
      </div>
      <div class="current-weather">
        <div>
          <div class="temp-wrapper">
            <img alt="" class="weather-icon">
            <p class="curr-temp"></p>
          </div>
          <p class="small text-secondary feels-like"></p>
          <p class="small text-secondary humidity"></p>
          <p class="small text-secondary wind-speed"></p>
        </div>
        <div>
          <p class="conditions"></p>
          <p class="desc text-secondary"></p>
        </div>
      </div>
      <div class="forecast"></div>
    </div>
    <p class="error-msg hide"></p>
  </main>
  <footer>
    <p>
      Coded by
      <a href="https://github.com/asadullahkhann">AsadUllahKhaNn
        <img src="./images/github-mark-white.svg" alt="github-mark"/>
      </a>
    </p>
  </footer>
</body>
</html>
